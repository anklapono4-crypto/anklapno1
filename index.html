<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO ACTIVE IP</title>
    <style>
        body { background-color: #0f172a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 30px; padding: 30px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .title { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .ip-display { font-size: 20px; color: #4ade80; margin: 20px 0; font-weight: bold; }
        .btn-active { width: 100%; padding: 18px; background: linear-gradient(to right, #6366f1, #d946ef); border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-active:hover { transform: scale(1.02); }
        .status { margin-top: 20px; font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="card">
    <h1 class="title">ACTIVE IP</h1>
    <p>IP của bạn hiện tại:</p>
    <div class="ip-display" id="my-ip">Đang lấy IP...</div>
    
    <button class="btn-active" onclick="activeIP()">XÁC NHẬN ACTIVE IP</button>
    
    <div class="status" id="msg">Sẵn sàng kết nối</div>
</div>

<script>
    // 1. Tự động lấy IP khi trang vừa load
    fetch('https://api.ipify.org?format=json')
        .then(res => res.json())
        .then(data => {
            document.getElementById('my-ip').innerText = data.ip;
        });

    // 2. Hàm Active IP (không cần nhập key)
    function activeIP() {
        const ip = document.getElementById('my-ip').innerText;
        const msg = document.getElementById('msg');
        
        msg.innerText = "Đang gửi IP " + ip + " lên hệ thống...";
        
        // Tại đây bạn có thể dùng fetch để gửi IP tới server/database của bạn
        setTimeout(() => {
            msg.innerText = "✅ Đã cập nhật IP thành công!";
            msg.style.color = "#4ade80";
        }, 1500);
    }
</script>

</body>
</html>
